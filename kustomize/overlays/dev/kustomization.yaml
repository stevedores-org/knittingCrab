apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: ConfigMap
      name: knitting-crab-config
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: knitting-crab-config
      data:
        RUST_LOG: "debug,knitting_crab_coordinator=debug"
