name: CI

on:
  push:
    branches:
      - main
      - develop
      - epic*/**
      - feature/**
      - fix/**
      - bugfix/**
      - copilot/**
      - claude-code/**
  pull_request:
    branches:
      - main
      - develop

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Code Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: cargo clippy --all-targets --all-features -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: cargo build --all-targets --verbose

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: cargo test --all-targets --verbose
      - run: cargo test --doc

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: cargo install cargo-audit
      - run: cargo audit

  apple-silicon:
    name: Apple Silicon Compatibility
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: cargo build --all-targets
      - run: cargo test --all-targets

  local-ci:
    name: Local CI Results
    runs-on: ubuntu-latest
    if: always()
    needs: [fmt, clippy, build, test, security, apple-silicon]
    steps:
      - name: Check results
        id: check
        run: |
          FMT="${{ needs.fmt.result }}"
          CLIPPY="${{ needs.clippy.result }}"
          BUILD="${{ needs.build.result }}"
          TEST="${{ needs.test.result }}"
          SECURITY="${{ needs.security.result }}"
          APPLE="${{ needs.apple-silicon.result }}"

          echo "fmt=${FMT}" >> $GITHUB_OUTPUT
          echo "clippy=${CLIPPY}" >> $GITHUB_OUTPUT
          echo "build=${BUILD}" >> $GITHUB_OUTPUT
          echo "test=${TEST}" >> $GITHUB_OUTPUT
          echo "security=${SECURITY}" >> $GITHUB_OUTPUT
          echo "apple=${APPLE}" >> $GITHUB_OUTPUT

          if [[ "$FMT" == "failure" ]] || [[ "$CLIPPY" == "failure" ]] || [[ "$BUILD" == "failure" ]] || [[ "$TEST" == "failure" ]] || [[ "$SECURITY" == "failure" ]] || [[ "$APPLE" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi
      - name: Report Results
        if: always()
        run: |
          echo "## ✅ CI Check Results"
          echo ""
          echo "| Check | Status |"
          echo "|-------|--------|"
          echo "| 📝 Code Formatting | ${{ steps.check.outputs.fmt }} |"
          echo "| 🔍 Clippy Lints | ${{ steps.check.outputs.clippy }} |"
          echo "| 🏗️ Build | ${{ steps.check.outputs.build }} |"
          echo "| ✅ Tests | ${{ steps.check.outputs.test }} |"
          echo "| 🔐 Security Audit | ${{ steps.check.outputs.security }} |"
          echo "| 🍎 Apple Silicon | ${{ steps.check.outputs.apple }} |"
